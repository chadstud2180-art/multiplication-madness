<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Multiplication Madness</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel (Compiles React JSX in the browser) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, useMemo } = React;

    // --- SVG Icons (Replacing Lucide dependencies for pure HTML compatibility) ---
    const Play = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
    const BarChart = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>;
    const Lock = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>;
    const ArrowRight = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>;
    const Home = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>;
    const Trophy = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"></path><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"></path><path d="M4 22h16"></path><path d="M10 14.66V17c0 1.1.9 2 2 2s2-.9 2-2v-2.34"></path><path d="M8 22v-5"></path><path d="M16 22v-5"></path><path d="M14.66 14A4.98 4.98 0 0 0 17 10V5H7v5a4.98 4.98 0 0 0 2.34 4"></path></svg>;
    const X = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;
    const ShieldAlert = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
    const ChevronUp = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="18 15 12 9 6 15"></polyline></svg>;
    const ChevronDown = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;

    // --- Configuration & Helpers ---
    const TEACHER_PASSWORD = "Msulaw#1";
    const TOTAL_QUESTIONS = 169; // 0-12 times tables (13 * 13)

    const FORBIDDEN_WORDS = [
      'fuck', 'shit', 'bitch', 'ass', 'damn', 'crap', 'hell', 'dick', 'pussy', 'cock', 
      'slut', 'whore', 'bastard', 'cunt', 'nigger', 'nigga', 'fag', 'faggot', 'spic', 
      'chink', 'twat', 'wanker', 'cum', 'sex', 'porn', 'boob', 'tits', 'vagina', 'penis', 
      'kys', 'stfu', 'lmao', 'lmfao', 'wtf', 'af', 'thot', 'simp', 'incel'
    ];

    const isValidName = (name) => {
      const trimmed = name.trim();
      if (trimmed.length < 2 || trimmed.length > 20) return false;
      if (!/^[A-Za-z\s\-]+$/.test(trimmed)) return false;
      const containsProfanity = FORBIDDEN_WORDS.some(word => {
        const regex = new RegExp(`\\b${word}\\b`, 'i');
        return regex.test(trimmed);
      });
      if (containsProfanity) return false;
      return true;
    };

    const formatTime = (seconds) => {
      const m = Math.floor(seconds / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    };

    const generateQuestions = () => {
      let q = [];
      for (let i = 0; i <= 12; i++) {
        for (let j = 0; j <= 12; j++) {
          q.push({ a: i, b: j });
        }
      }
      for (let i = q.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [q[i], q[j]] = [q[j], q[i]];
      }
      return q;
    };

    // --- Main App Component ---
    function App() {
      const [view, setView] = useState('home'); 
      const [leaderboard, setLeaderboard] = useState([]);
      const [sortConfig, setSortConfig] = useState({ key: 'timeElapsed', direction: 'ascending' });
      
      const [showTeacherAuth, setShowTeacherAuth] = useState(false);
      
      const [studentName, setStudentName] = useState("");
      const [queue, setQueue] = useState([]);
      const [totalAsked, setTotalAsked] = useState(0);
      const [correctCount, setCorrectCount] = useState(0);
      const [timeElapsed, setTimeElapsed] = useState(0);
      const [timerActive, setTimerActive] = useState(false);
      
      const [currentAnswer, setCurrentAnswer] = useState("");
      const [errorMsg, setErrorMsg] = useState("");

      const inputRef = useRef(null);

      // Timer Logic
      useEffect(() => {
        let interval = null;
        if (timerActive) {
          interval = setInterval(() => setTimeElapsed(prev => prev + 1), 1000);
        } else if (!timerActive && timeElapsed !== 0) {
          clearInterval(interval);
        }
        return () => clearInterval(interval);
      }, [timerActive, timeElapsed]);

      // Autofocus input
      useEffect(() => {
        if (view === 'game' && inputRef.current) {
          inputRef.current.focus();
        }
      }, [view, queue]);

      const handleStartNameEntry = () => {
        setStudentName("");
        setErrorMsg("");
        setView('name_entry');
      };

      const handleStartGame = () => {
        if (!isValidName(studentName)) {
          setErrorMsg("Please enter a real name (letters only, 2-20 characters). No slang or profanity.");
          return;
        }
        setQueue(generateQuestions());
        setTotalAsked(0);
        setCorrectCount(0);
        setTimeElapsed(0);
        setCurrentAnswer("");
        setErrorMsg("");
        setView('game');
        setTimerActive(true);
      };

      const handleSubmitAnswer = (e) => {
        e.preventDefault();
        if (currentAnswer.trim() === "") return;

        const numAnswer = parseInt(currentAnswer, 10);
        const currentQ = queue[0];
        const isCorrect = numAnswer === (currentQ.a * currentQ.b);

        let newQueue = [...queue];

        if (isCorrect) {
          newQueue.shift(); 
          setCorrectCount(prev => prev + 1);
        } else {
          const wrongQ = newQueue.shift();
          const insertIndex = Math.max(1, Math.floor(Math.random() * newQueue.length));
          newQueue.splice(insertIndex, 0, wrongQ);
        }

        setTotalAsked(prev => prev + 1);
        setQueue(newQueue);
        setCurrentAnswer("");

        if (newQueue.length === 0) {
          setTimerActive(false);
          const percentage = ((TOTAL_QUESTIONS / (totalAsked + 1)) * 100).toFixed(1);
          const now = new Date();
          
          const newScore = {
            id: Date.now(),
            name: studentName.trim(),
            timeElapsed: timeElapsed,
            formattedTime: formatTime(timeElapsed),
            correct: TOTAL_QUESTIONS,
            totalAsked: totalAsked + 1,
            percentage: parseFloat(percentage),
            dateAchieved: now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
            timestamp: now.getTime()
          };

          setLeaderboard(prev => [...prev, newScore]);
          setView('results');
        }
      };

      const handleTeacherAuth = (e) => {
        e.preventDefault();
        const pw = e.target.password.value;
        if (pw === TEACHER_PASSWORD) {
          setShowTeacherAuth(false);
          setView('teacher_dashboard');
        } else {
          setErrorMsg("Incorrect password.");
        }
      };

      const goHome = () => {
        setView('home');
        setShowTeacherAuth(false);
        setErrorMsg("");
      };

      const requestSort = (key) => {
        let direction = 'ascending';
        if (sortConfig.key === key && sortConfig.direction === 'ascending') {
          direction = 'descending';
        }
        setSortConfig({ key, direction });
      };

      const sortedLeaderboard = useMemo(() => {
        let sortableItems = [...leaderboard];
        sortableItems.sort((a, b) => {
          if (a[sortConfig.key] < b[sortConfig.key]) return sortConfig.direction === 'ascending' ? -1 : 1;
          if (a[sortConfig.key] > b[sortConfig.key]) return sortConfig.direction === 'ascending' ? 1 : -1;
          return 0;
        });
        return sortableItems;
      }, [leaderboard, sortConfig]);

      const renderHome = () => (
        <div className="flex flex-col items-center justify-center min-h-[80vh] text-center space-y-8 animate-fade-in">
          <div className="space-y-4">
            <h1 className="text-5xl md:text-7xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 drop-shadow-sm">
              Multiplication Madness
            </h1>
            <p className="text-xl text-gray-600 max-w-xl mx-auto">
              Master your 0-12 times tables! Answer all 169 questions correctly to conquer the madness.
            </p>
          </div>
          <div className="flex flex-col sm:flex-row gap-4 mt-8">
            <button onClick={handleStartNameEntry} className="flex items-center justify-center px-8 py-4 text-xl font-bold text-white transition-all transform bg-indigo-600 rounded-full hover:bg-indigo-700 hover:scale-105 shadow-lg">
              <Play className="w-6 h-6 mr-2 fill-current" /> Play Game
            </button>
            <button onClick={() => { setErrorMsg(""); setShowTeacherAuth(true); }} className="flex items-center justify-center px-8 py-4 text-xl font-bold text-indigo-700 transition-all transform bg-indigo-100 rounded-full hover:bg-indigo-200 hover:scale-105 shadow-md">
              <BarChart className="w-6 h-6 mr-2" /> Leaderboard
            </button>
          </div>
        </div>
      );

      const renderNameEntry = () => (
        <div className="flex flex-col items-center justify-center min-h-[70vh] animate-fade-in">
          <div className="w-full max-w-md p-8 bg-white rounded-3xl shadow-xl">
            <h2 className="text-3xl font-bold text-center text-gray-800 mb-6">Enter Your Name</h2>
            <div className="space-y-4">
              <input type="text" placeholder="First and Last Name" value={studentName} onChange={(e) => setStudentName(e.target.value)} onKeyDown={(e) => e.key === 'Enter' && handleStartGame()} className="w-full px-6 py-4 text-xl text-center bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none focus:ring-2 focus:ring-indigo-200 transition-colors" />
              {errorMsg && (
                <div className="flex items-start text-red-500 text-sm font-medium bg-red-50 p-3 rounded-lg">
                  <ShieldAlert className="w-5 h-5 mr-2 flex-shrink-0" /><span>{errorMsg}</span>
                </div>
              )}
              <button onClick={handleStartGame} className="w-full flex items-center justify-center px-6 py-4 text-xl font-bold text-white bg-green-500 rounded-xl hover:bg-green-600 transition-colors shadow-md">
                Begin Challenge <ArrowRight className="w-6 h-6 ml-2" />
              </button>
              <button onClick={goHome} className="w-full py-3 text-gray-500 hover:text-gray-700 font-medium">Cancel</button>
            </div>
          </div>
        </div>
      );

      const renderGame = () => {
        if (queue.length === 0) return null;
        const currentQ = queue[0];
        const progress = (correctCount / TOTAL_QUESTIONS) * 100;

        return (
          <div className="flex flex-col items-center justify-center min-h-[80vh] w-full max-w-2xl mx-auto animate-fade-in">
            <div className="flex items-center justify-between w-full mb-8 px-4">
              <div className="flex items-center bg-white px-4 py-2 rounded-2xl shadow-sm border border-gray-100">
                <Trophy className="w-5 h-5 text-yellow-500 mr-2" />
                <span className="font-bold text-gray-700">{correctCount} / {TOTAL_QUESTIONS}</span>
              </div>
              <div className="text-2xl font-mono font-bold text-indigo-600 bg-indigo-50 px-4 py-2 rounded-2xl border border-indigo-100">
                {formatTime(timeElapsed)}
              </div>
            </div>
            <div className="w-full bg-gray-200 rounded-full h-3 mb-10 overflow-hidden shadow-inner">
              <div className="bg-gradient-to-r from-green-400 to-green-500 h-3 transition-all duration-300" style={{ width: `${progress}%` }}></div>
            </div>
            <div className="bg-white p-12 rounded-3xl shadow-2xl w-full flex flex-col items-center border border-gray-50">
              <h2 className="text-8xl md:text-9xl font-black text-gray-800 tracking-tighter mb-8">{currentQ.a} &times; {currentQ.b}</h2>
              <form onSubmit={handleSubmitAnswer} className="w-full flex gap-4 max-w-md">
                <input ref={inputRef} type="number" value={currentAnswer} onChange={(e) => setCurrentAnswer(e.target.value)} className="flex-1 text-4xl text-center font-bold py-4 bg-gray-50 border-4 border-gray-200 rounded-2xl focus:border-indigo-500 focus:outline-none transition-colors" placeholder="?" autoComplete="off" />
                <button type="submit" className="px-8 bg-indigo-600 text-white rounded-2xl hover:bg-indigo-700 transition-colors shadow-lg flex items-center justify-center">
                  <ArrowRight className="w-8 h-8" />
                </button>
              </form>
            </div>
            <p className="mt-8 text-gray-500 font-medium">Mistakes shuffle back into the madness!</p>
          </div>
        );
      };

      const renderResults = () => {
        const result = leaderboard.find(l => l.name === studentName.trim() && l.timeElapsed === timeElapsed);
        if (!result) return null;
        const radius = 15.915494309189533;
        const strokeDasharray = `${result.percentage} 100`;

        return (
          <div className="flex flex-col items-center justify-center min-h-[80vh] animate-fade-in">
            <div className="bg-white p-10 rounded-3xl shadow-2xl w-full max-w-3xl text-center border border-gray-100">
              <Trophy className="w-20 h-20 text-yellow-400 mx-auto mb-6" />
              <h2 className="text-4xl font-extrabold text-gray-800 mb-2">Madness Conquered!</h2>
              <p className="text-xl text-gray-500 font-medium mb-10">Excellent work, {result.name}!</p>
              
              <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-10">
                <div className="bg-indigo-50 p-6 rounded-2xl"><p className="text-sm text-indigo-600 font-bold uppercase mb-1">Total Time</p><p className="text-4xl font-mono font-bold text-indigo-900">{result.formattedTime}</p></div>
                <div className="bg-green-50 p-6 rounded-2xl"><p className="text-sm text-green-600 font-bold uppercase mb-1">Accuracy</p><p className="text-4xl font-bold text-green-900">{result.percentage}%</p></div>
                <div className="bg-orange-50 p-6 rounded-2xl"><p className="text-sm text-orange-600 font-bold uppercase mb-1">Mistakes Made</p><p className="text-4xl font-bold text-orange-900">{result.totalAsked - result.correct}</p></div>
              </div>

              <div className="flex flex-col items-center justify-center bg-gray-50 p-8 rounded-2xl mb-10">
                <h3 className="text-lg font-bold text-gray-700 mb-6">First-Try Accuracy</h3>
                <div className="relative w-48 h-48">
                  <svg viewBox="0 0 32 32" className="w-full h-full rounded-full transform -rotate-90 bg-red-400 shadow-inner">
                    <circle r={radius} cx="16" cy="16" fill="transparent" stroke="#4ade80" strokeWidth="32" strokeDasharray={strokeDasharray} />
                  </svg>
                  <div className="absolute inset-0 flex items-center justify-center">
                    <div className="bg-white w-32 h-32 rounded-full flex flex-col items-center justify-center shadow-sm">
                       <span className="text-3xl font-black text-gray-800">{result.percentage}%</span>
                       <span className="text-xs text-gray-500 font-medium mt-1">Correct</span>
                    </div>
                  </div>
                </div>
                <div className="flex gap-6 mt-6">
                  <div className="flex items-center"><div className="w-4 h-4 bg-green-400 rounded-full mr-2"></div><span className="text-sm font-medium">Correct ({result.correct})</span></div>
                  <div className="flex items-center"><div className="w-4 h-4 bg-red-400 rounded-full mr-2"></div><span className="text-sm font-medium">Missed ({result.totalAsked - result.correct})</span></div>
                </div>
              </div>
              <button onClick={goHome} className="flex items-center justify-center w-full px-8 py-4 text-xl font-bold text-white bg-indigo-600 rounded-xl hover:bg-indigo-700 shadow-lg"><Home className="w-6 h-6 mr-2" /> Return Home</button>
            </div>
          </div>
        );
      };

      const renderTeacherDashboard = () => {
        const SortIcon = ({ columnKey }) => {
          if (sortConfig.key !== columnKey) return <ChevronUp className="w-4 h-4 ml-1 opacity-20 inline-block" />;
          return sortConfig.direction === 'ascending' ? <ChevronUp className="w-4 h-4 ml-1 inline-block text-indigo-600" /> : <ChevronDown className="w-4 h-4 ml-1 inline-block text-indigo-600" />;
        };

        return (
          <div className="w-full max-w-5xl mx-auto py-10 animate-fade-in">
            <div className="flex items-center justify-between mb-8">
              <div>
                <h2 className="text-3xl font-extrabold text-gray-800 flex items-center"><Lock className="w-8 h-8 mr-3 text-indigo-600" /> Teacher Dashboard</h2>
                <p className="text-gray-500 font-medium mt-1">Live Leaderboard & Student Progress</p>
              </div>
              <button onClick={goHome} className="flex items-center px-4 py-2 text-gray-600 bg-gray-100 rounded-lg hover:bg-gray-200 transition-colors font-medium"><Home className="w-5 h-5 mr-2" /> Exit</button>
            </div>
            <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
              <div className="overflow-x-auto">
                <table className="w-full text-left border-collapse">
                  <thead>
                    <tr className="bg-indigo-50 border-b border-indigo-100">
                      <th className="px-6 py-4 font-bold text-indigo-900">Rank</th>
                      <th className="px-6 py-4 font-bold text-indigo-900 cursor-pointer hover:bg-indigo-100 select-none" onClick={() => requestSort('name')}><div className="flex items-center">Student Name <SortIcon columnKey="name" /></div></th>
                      <th className="px-6 py-4 font-bold text-indigo-900 cursor-pointer hover:bg-indigo-100 select-none text-center" onClick={() => requestSort('timeElapsed')}><div className="flex items-center justify-center">Time <SortIcon columnKey="timeElapsed" /></div></th>
                      <th className="px-6 py-4 font-bold text-indigo-900 cursor-pointer hover:bg-indigo-100 select-none text-center" onClick={() => requestSort('percentage')}><div className="flex items-center justify-center">Accuracy (%) <SortIcon columnKey="percentage" /></div></th>
                      <th className="px-6 py-4 font-bold text-indigo-900 cursor-pointer hover:bg-indigo-100 select-none text-center" onClick={() => requestSort('totalAsked')}><div className="flex items-center justify-center">Total Asked <SortIcon columnKey="totalAsked" /></div></th>
                      <th className="px-6 py-4 font-bold text-indigo-900 cursor-pointer hover:bg-indigo-100 select-none text-right" onClick={() => requestSort('timestamp')}><div className="flex items-center justify-end">Date & Time <SortIcon columnKey="timestamp" /></div></th>
                    </tr>
                  </thead>
                  <tbody>
                    {sortedLeaderboard.length === 0 ? (
                      <tr><td colSpan="6" className="px-6 py-12 text-center text-gray-500 font-medium">No results recorded yet. Have students play the game!</td></tr>
                    ) : (
                      sortedLeaderboard.map((entry, index) => (
                        <tr key={entry.id} className="border-b border-gray-50 hover:bg-gray-50 transition-colors">
                          <td className="px-6 py-4">{index === 0 && sortConfig.key === 'timeElapsed' && sortConfig.direction === 'ascending' ? <Trophy className="w-6 h-6 text-yellow-500" /> : <span className="font-bold text-gray-400">#{index + 1}</span>}</td>
                          <td className="px-6 py-4 font-bold text-gray-800">{entry.name}</td>
                          <td className="px-6 py-4 font-mono font-medium text-center text-gray-600">{entry.formattedTime}</td>
                          <td className="px-6 py-4 text-center"><span className={`px-3 py-1 rounded-full text-sm font-bold ${entry.percentage >= 90 ? 'bg-green-100 text-green-700' : entry.percentage >= 75 ? 'bg-yellow-100 text-yellow-700' : 'bg-red-100 text-red-700'}`}>{entry.percentage}%</span></td>
                          <td className="px-6 py-4 text-center text-gray-600 font-medium">{entry.totalAsked}</td>
                          <td className="px-6 py-4 text-right text-gray-500 text-sm font-medium">{entry.dateAchieved}</td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      };

      return (
        <div className="min-h-screen bg-slate-50 text-slate-900 font-sans p-6 selection:bg-indigo-200">
          {view !== 'game' && (
            <header className="max-w-6xl mx-auto flex items-center justify-between py-4">
              <div className="flex items-center space-x-2">
                <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center transform rotate-12"><X className="w-6 h-6 text-white" /></div>
                <span className="font-black text-xl tracking-tight text-gray-800">MathMadness.</span>
              </div>
            </header>
          )}

          <main className="max-w-6xl mx-auto">
            {view === 'home' && renderHome()}
            {view === 'name_entry' && renderNameEntry()}
            {view === 'game' && renderGame()}
            {view === 'results' && renderResults()}
            {view === 'teacher_dashboard' && renderTeacherDashboard()}
          </main>

          {showTeacherAuth && (
            <div className="fixed inset-0 bg-gray-900/40 backdrop-blur-sm flex items-center justify-center z-50 p-4">
              <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl relative">
                <button onClick={() => setShowTeacherAuth(false)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-600 bg-gray-100 p-2 rounded-full"><X className="w-5 h-5" /></button>
                <div className="w-16 h-16 bg-indigo-100 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-6"><Lock className="w-8 h-8" /></div>
                <h3 className="text-2xl font-bold text-center text-gray-800 mb-2">Teacher Access</h3>
                <p className="text-center text-gray-500 mb-6 font-medium">Enter password to view leaderboard</p>
                <form onSubmit={handleTeacherAuth}>
                  <input type="password" name="password" placeholder="Password" className="w-full px-4 py-3 bg-gray-50 border-2 border-gray-200 rounded-xl focus:border-indigo-500 focus:outline-none mb-4" autoFocus />
                  {errorMsg && <p className="text-red-500 text-sm mb-4 font-medium text-center">{errorMsg}</p>}
                  <button type="submit" className="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl hover:bg-indigo-700 transition-colors">Unlock Dashboard</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
